name: xm_crypto_investment_local_compose

services:
  postgres:
    image: postgres:16
    container_name: xm_crypto_investment_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: crypto_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7.2
    container_name: xm_crypto_investment_redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass $${REDIS_PASSWORD} && exec redis-server"]
    environment:
      REDIS_PASSWORD: pass
    ports:
      - "6379:6379"
  crypto-reco:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xm_crypto_investment_service
    ports:
      - "8080:8080"
    depends_on: ["postgres", "redis"]
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
      APP_DATA_DIR: /data
      DB_HOST: jdbc:postgresql://postgres:5432
      DB_NAME: crypto_db
      DB_USER: user
      DB_PASS: pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: pass
    volumes:
      - ./data:/data:ro

volumes:
  pgdata: